<h3 class="fill-remaining-space">Editar Empresa</h3>
<div class="container">
  <form [formGroup]="myForm" (ngSubmit)="onSubmit(myForm.value)">

    <div class="form-group">
      <label for="nombre">Nombre de empresa:</label>
      <input class="form-control" formControlName="nombre" id="nombre">
    </div>

    <div class="form-group">
      <label for="descripcion">Descripción:</label>
      <input class="form-control" formControlName="descripcion" id="descripcion">
    </div>

    <div class="form-group">
      <label for="telefono">Teléfono:</label>
      <input type="number" class="form-control" formControlName="telefono" id="telefono">
    </div>

    <div class="form-group">
        <label for="direccion">Dirección:</label>
        <input class="form-control" formControlName="direccion" id="direccion">
    </div>

    <div class="form-group">
        <label for="nif">NIF:</label>
        <input class="form-control" formControlName="nif" id="nif">
    </div>

    <button type="submit" class="btn btn-primary" [disabled]="myForm.invalid">Actualizar datos</button>
  </form>
</div>

<div *ngIf="errorMessage" class="alert alert-danger">
  {{ errorMessage }}
</div>
