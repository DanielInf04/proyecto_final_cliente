<div class="container min-vh-100 d-flex align-items-center justify-content-center">
  <form [formGroup]="registerForm" (ngSubmit)="onRegister()" class="w-100" style="max-width: 600px;">
    <h5 class="mb-4 text-center">Crear Cuenta</h5>

    <div class="form-floating mb-3">
      <input type="text" class="form-control" id="name" formControlName="name" placeholder="Nombre" name="name">
      <label for="name">Nombre</label>
    </div>

    <div class="form-floating mb-3">
      <input type="email" class="form-control" id="email" formControlName="email" placeholder="Email" name="email">
      <label for="email">Email</label>
    </div>

    <div class="form-floating mb-3">
      <input type="password" class="form-control" id="password" formControlName="password" placeholder="Contraseña" name="password">
      <label for="password">Contraseña</label>
    </div>

    <div class="form-floating mb-3">
      <input type="password" class="form-control" id="password_confirmation" formControlName="password_confirmation" placeholder="Confirmar Contraseña" name="password_confirmation">
      <label for="password_confirmation">Confirmar Contraseña</label>
    </div>
    <div *ngIf="registerForm.errors?.['passwordMismatch'] && registerForm.touched" class="text-danger small ms-1">
      Las contraseñas no coinciden
    </div>

    <div class="form-floating mb-3">
      <select class="form-select" id="role" formControlName="role" aria-label="Tipo de usuario">
        <option value="">Selecciona una opción</option>
        <option value="cliente">Cliente</option>
        <option value="empresa">Empresa</option>
      </select>
      <label for="role">Tipo de Usuario</label>
    </div>

    <!-- Campos para Cliente -->
    <div *ngIf="registerForm.get('role')?.value === 'cliente'" class="form-floating mb-3">
      <input type="text" class="form-control" id="cliente_telefono" formControlName="cliente_telefono" placeholder="Teléfono" name="cliente_telefono">
      <label for="cliente_telefono">Teléfono</label>
    </div>

    <!-- Campos para Empresa -->
    <div *ngIf="registerForm.get('role')?.value === 'empresa'">
      <div class="form-floating mb-3">
        <input type="text" class="form-control" id="empresa_nombre" formControlName="empresa_nombre" placeholder="Nombre de la Empresa" name="empresa_nombre">
        <label for="empresa_nombre">Nombre de la Empresa</label>
      </div>
      <div class="form-floating mb-3">
        <input type="text" class="form-control" id="empresa_telefono" formControlName="empresa_telefono" placeholder="Teléfono" name="empresa_telefono">
        <label for="empresa_telefono">Teléfono</label>
      </div>
      <div class="form-floating mb-3">
        <input type="text" class="form-control" id="empresa_direccion" formControlName="empresa_direccion" placeholder="Dirección" name="empresa_direccion">
        <label for="empresa_direccion">Dirección</label>
      </div>
      <div class="form-floating mb-3">
        <textarea class="form-control" id="empresa_descripcion" formControlName="empresa_descripcion" placeholder="Descripción" name="empresa_descripcion" style="height: 100px"></textarea>
        <label for="empresa_descripcion">Descripción</label>
      </div>
      <div class="form-floating mb-3">
        <input type="text" class="form-control" id="empresa_nif" formControlName="empresa_nif" placeholder="NIF" name="empresa_nif">
        <label for="empresa_nif">NIF</label>
      </div>
    </div>

    <div class="text-center mt-4">
      <button type="submit" class="btn btn-primary w-100 py-2" [disabled]="registerForm.invalid">Registrarse</button>
    </div>
  </form>
</div>
